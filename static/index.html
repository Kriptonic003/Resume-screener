<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Screener</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="glass-background"></div>
    
    <div class="container">
        <header>
            <h1>📄 AI Resume Screener</h1>
            <p>Upload a resume and paste a job description to get instant AI-powered screening insights.</p>
        </header>

        <main>
            <div class="input-section glass-panel">
                <div class="input-group">
                    <label>Upload Resume (PDF, DOCX)</label>
                    <div class="file-drop-area" id="file-drop-area">
                        <span class="file-icon">📁</span>
                        <span class="file-msg" id="file-msg">Drag & drop or click to upload</span>
                        <input type="file" id="resume-file" accept=".pdf, .docx">
                    </div>
                </div>

                <div class="input-group">
                    <label>Job Description</label>
                    <textarea id="job-description" placeholder="Paste the full job description here..."></textarea>
                </div>
            </div>

            <div class="action-section">
                <button id="scan-btn" class="primary-btn">
                    <span class="btn-text">Scan Resume</span>
                    <span class="loader hidden"></span>
                </button>
            </div>

            <div id="results-section" class="results-section hidden">
                <div class="metrics-grid">
                    <div class="metric-card glass-panel" style="--accent: var(--color-purple)">
                        <div class="metric-label">Overall Fit</div>
                        <div class="metric-value"><span class="counter" id="val-overall">0</span>%</div>
                    </div>
                    <div class="metric-card glass-panel" style="--accent: var(--color-teal)">
                        <div class="metric-label">Skills Match</div>
                        <div class="metric-value"><span class="counter" id="val-skills">0</span>%</div>
                    </div>
                    <div class="metric-card glass-panel" style="--accent: var(--color-amber)">
                        <div class="metric-label">Experience Match</div>
                        <div class="metric-value"><span class="counter" id="val-exp">0</span>%</div>
                    </div>
                    <div class="metric-card glass-panel" style="--accent: var(--color-red)">
                        <div class="metric-label">Keywords Score</div>
                        <div class="metric-value"><span class="counter" id="val-keywords">0</span>%</div>
                    </div>
                </div>

                <div class="details-grid">
                    <div class="skills-card glass-panel">
                        <h3>Skill Breakdown</h3>
                        <div id="skills-container" class="skills-container">
                            <!-- Populated dynamically -->
                        </div>
                    </div>

                    <div class="keywords-card glass-panel">
                        <h3>Keywords</h3>
                        <div id="keywords-container" class="pill-container">
                            <!-- Populated dynamically -->
                        </div>
                    </div>
                </div>

                <div class="recommendation-card glass-panel">
                    <h3>AI Recommendation</h3>
                    <p id="recommendation-text"></p>
                </div>
            </div>
            
            <div id="error-message" class="error-message hidden"></div>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
